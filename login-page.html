<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majesty</title>
    <link rel="stylesheet" href="login-page.css">
    
</head>
<body>
    <!-- <div class="loader"></div> -->
    <div class="stage">
      <!-- <img style="width: 100px;" src="fred's logo.png" alt="n"> -->
    <div class="lamp" onclick="toggleLight()" id="lamp">
      <div class="lamp-shade"></div>
      <div class="lamp-neck"></div>
      <div class="lamp-body"></div>
      <div class="lamp-pole"></div>
      <div class="lamp-base"></div>
      <div class="lamp-string">
        <div class="string-line"></div>
        <div class="string-bead"></div>
      </div>
    </div>

    <div class="card" id="card">
      <div class="card-brand">
        <div class="brand-icon"><button>M</button></div>
        
        <div>
          <div class="brand-name">Majesty</div>
          <div class="brand-sub">Welcome back</div>
        </div>
      </div>
      <h2>Sign in</h2>
      <p>Turn on the lamp to continue</p>
      <label class="field-label">Email Address</label>
      <div class="field">
        <span class="field-icon">✉️</span>
        <input type="email" placeholder="you@example.com" />
      </div>
      <label class="field-label">Password</label>
      <div class="field">
        <span class="field-icon">🔒</span>
        <input type="password" placeholder="••••••••" />
      </div>
      <a class="forgot" href="#">Forgot password?</a>
      <button class="btn-signin">Sign In</button>
      <div class="card-footer">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">🖱️ Click the lamp to turn it on</div>
  


  

  <script src="login-page.js"></script>      
</body>
</html>
