<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majesty</title>
    <!-- <link rel="stylesheet" href="index.css"> -->
    <style>
      button {
  background: linear-gradient(135deg, #01000e, #020eb3);
  height: 60px;
  width: 60px;
  border-radius: 50px;
  font-size: larger;
  font-family: bold;
  
}

.loader {
    height: 50px;
    width: 50px;
    border: 5px solid white;
    border-radius: 50%;
    border-top-color: blue;
    animation: spin 1s ease infinite;
}

@keyframes spin {
    0%{
        transform: rotate(0deg);
    }
    100%{
        transform: rotate(360deg);
    }
}



/* login card */
:root {
      --on: 0;
      --blue: #060494;
      --blue-light: #787fe7;
      --bg-dark: #161724;
      --transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: rgb(
        calc(10 + 8 * var(--on)),
        calc(15 + 10  * var(--on)),
        calc(40 + 30 * var(--on))
      );
      transition: background-color var(--transition);
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(93, 82, 247, 0.35) 0%,
        rgba(109, 85, 247, 0.1) 40%,
        transparent 70%
      );
      opacity: var(--on);
      transition: opacity var(--transition);
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 30px;
      width: 100%;
      max-width: 700px;
      padding: 20px;
      z-index: 1;
    }

    .lamp {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }

    .lamp-shade {
      width: 180px;
      height: 0;
      border-left: 65px solid transparent;
      border-right: 65px solid transparent;
      border-bottom: 110px solid rgb(45, 45, 236);
      filter: drop-shadow(0 0 calc(30px * var(--on)) rgba(96, 85, 247, 0.7));
      transition: border-bottom-color var(--transition), filter var(--transition);
      position: relative;
      z-index: 2;
    }

    .lamp-shade::after {
      content: '';
      position: absolute;
      top: 20px;
      left: -40px;
      width: 80px;
      height: 70px;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
      opacity: var(--on);
      transition: opacity var(--transition);
    }

    .lamp-neck {
      width: 12px;
      height: 20px;
      background: var(--blue);
      transition: background-color var(--transition);
      z-index: 1;
    }

    .lamp-body {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--blue);
      transition: background-color var(--transition);
    }

    .lamp-pole {
      width: 6px;
      height: 130px;
      background: var(--blue);
      transition: background var(--transition);
    }

    .lamp-base {
      width: 90px;
      height: 16px;
      border-radius: 50%;
      background: var(--blue-light);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transition: background-color var(--transition);
    }

    .lamp-string {
      position: absolute;
      top: 118px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .string-line {
      width: 2px;
      height: 35px;
      background: rgba(248, 248, 252, 0.5);
    }

    .string-bead {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgb(
        calc(150 + 100 * var(--on)),
        calc(120 + 80  * var(--on)),
        calc(180 + 75  * var(--on))
      );
      box-shadow: 0 0 calc(8px * var(--on)) rgba(253, 253, 255, 0.8);
      transition: background-color var(--transition), box-shadow var(--transition);
    }

    .lamp.swinging .string-line,
    .lamp.swinging .string-bead {
      animation: swing 0.5s ease-out;
    }

    @keyframes swing {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(6px); }
      75%  { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    .card {
      background: rgba(10, 10, 35, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(96, 85, 247, 0.2);
      border-radius: 20px;
      padding: 32px 28px;
      width: 300px;
      flex-shrink: 0;
      opacity: 0;
      transform: translateX(30px);
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
      font-family: bold;
    }

    .card.is-active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }

    .card-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .brand-icon {
        background-color:#2d2bce;
        height: 60px;
        width: 60px;
        border-radius: 50px;
        font-size: larger;
    }

    .brand-name {
      color: #c7cdff;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand-sub {
      color: rgba(170, 174, 230, 0.5);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .card h2 {
      color: #eae8ff;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .card p {
      color: rgba(145, 146, 226, 0.6);
      font-size: 12px;
      margin-bottom: 22px;
    }

    .field-label {
      display: block;
      color: rgba(170, 179, 230, 0.7);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field {
      position: relative;
      margin-bottom: 16px;
    }

    .field input {
      width: 100%;
      background: rgba(96, 85, 247, 0.08);
      border: 1px solid rgba(85, 88, 247, 0.25);
      border-radius: 10px;
      padding: 10px 36px 10px 36px;
      color: #cdc7ff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .field input::placeholder {
      color: rgba(85, 88, 247, 0.35);
    }

    .field input:focus {
      border-color: rgba(101, 85, 247, 0.7);
      background: rgba(101, 85, 247, 0.14);
    }

    .field-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.45;
    }

    .forgot {
      display: block;
      text-align: right;
      color: rgba(85, 88, 247, 0.7);
      font-size: 11px;
      margin-top: -10px;
      margin-bottom: 20px;
      cursor: pointer;
      text-decoration: none;
    }

    .forgot:hover { color: #6555f7; }

    .btn-signin {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #01000e, #020eb3);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(85, 101, 247, 0.35);
    }

    .btn-signin:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(85, 101, 247, 0.5);
    }

    .btn-signin:active { transform: translateY(0); }

    .card-footer {
      text-align: center;
      margin-top: 16px;
      color: rgba(171, 170, 230, 0.4);
      font-size: 11px;
    }

    .card-footer a {
      color: #5565f7;
      text-decoration: none;
      font-weight: 700;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(170, 174, 230, 0.3);
      font-size: 12px;
      letter-spacing: 1px;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .hint.hidden { opacity: 0; }

    @media (max-width: 520px) {
      .stage {
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .card {
        width: 90%;
        max-width: 320px;
        transform: translateY(20px);
      }
      .card.is-active { transform: translateY(0); }
    }
    </style>
</head>
<body>
    <!-- <div class="loader"></div> -->
    <div class="stage">
      <!-- <img style="width: 100px;" src="fred's logo.png" alt="n"> -->
    <div class="lamp" onclick="toggleLight()" id="lamp">
      <div class="lamp-shade"></div>
      <div class="lamp-neck"></div>
      <div class="lamp-body"></div>
      <div class="lamp-pole"></div>
      <div class="lamp-base"></div>
      <div class="lamp-string">
        <div class="string-line"></div>
        <div class="string-bead"></div>
      </div>
    </div>

    <div class="card" id="card">
      <div class="card-brand">
        <div class="brand-icon"><button>M</button></div>
        
        <div>
          <div class="brand-name">Majesty</div>
          <div class="brand-sub">Welcome back</div>
        </div>
      </div>
      <h2>Sign in</h2>
      <p>Turn on the lamp to continue</p>
      <label class="field-label">Email Address</label>
      <div class="field">
        <span class="field-icon">✉️</span>
        <input type="email" placeholder="you@example.com" />
      </div>
      <label class="field-label">Password</label>
      <div class="field">
        <span class="field-icon">🔒</span>
        <input type="password" placeholder="••••••••" />
      </div>
      <a class="forgot" href="#">Forgot password?</a>
      <button class="btn-signin">Sign In</button>
      <div class="card-footer">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">🖱️ Click the lamp to turn it on</div>
  


  

  <script>
    const ROOT = document.documentElement;
    const lamp = document.getElementById('lamp');
    const card = document.getElementById('card');
    const hint = document.getElementById('hint');
    let lightOn = false;

    function toggleLight() {
      lightOn = !lightOn;
      ROOT.style.setProperty('--on', lightOn ? '1' : '0');
      card.classList.toggle('is-active', lightOn);
      hint.classList.add('hidden');
      lamp.classList.add('swinging');
      setTimeout(() => lamp.classList.remove('swinging'), 600);
    }
  </script>      
</body>
</html>
